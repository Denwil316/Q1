<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>QEL · Navegador de Sistema v0.2</title>
<style>
  body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, 'Helvetica Neue', Arial, 'Noto Sans', 'Apple Color Emoji', 'Segoe UI Emoji'; margin: 24px; }
  header { margin-bottom: 16px; }
  .muted { color: #666; font-size: 0.9rem; }
  input[type="search"] { width: 100%; padding: 10px 12px; font-size: 1rem; border: 1px solid #ccc; border-radius: 8px; }
  .list { margin-top: 16px; }
  .row { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px dashed #eee; gap: 12px; }
  .row a { text-decoration: none; }
  .row .title { font-weight: 600; overflow-wrap: anywhere; }
  .row .actions a { margin-left: 12px; font-size: 0.9rem; }
  .pill { display:inline-block; padding:2px 8px; border-radius:999px; background:#f2f2f2; font-size: 0.8rem; }
  footer { margin-top: 24px; font-size: .9rem; }
</style>
</head>
<body>
<!-- [QEL::ECO[96]::RECALL A96-250814-NAVEGADOR] SOT=PREH-NAV/v0.2 VERSION=v0.2 UPDATED=2025-08-14 -->
<header>
  <h1>QEL · Navegador de Sistema <span class="pill">v0.2</span></h1>
  <div class="muted">Explora archivos (histórico completo). Búsqueda local por nombre.</div>
  <div style="margin-top:12px;">
    <input id="q" type="search" placeholder="Filtra por nombre… (p. ej., Lamina, Diario, MFH, Tratado)" autofocus>
  </div>
  <div style="margin-top:10px;">
    <a href="sandbox:/mnt/data/QEL_Documentos_Completos_vALL_2025-08-14.zip" download>📦 Descargar ZIP completo (histórico)</a>
  </div>
</header>
<section class="list" id="list"></section>
<footer class="muted">
  Generado el 2025-08-14. Para añadir nuevos documentos, vuelve a empaquetar y reemplaza este HTML o el ZIP.
</footer>
<script>
const items = [];
const list = document.getElementById('list');
const q = document.getElementById('q');
function render(filter='') {
  list.innerHTML = '';
  const f = filter.toLowerCase();
  items.filter(x => x.title.toLowerCase().includes(f)).forEach(x => {
    const row = document.createElement('div');
    row.className = 'row';
    const a = document.createElement('a');
    a.href = x.href;
    a.textContent = x.title;
    a.className = 'title';
    const actions = document.createElement('div');
    actions.className = 'actions';
    const open = document.createElement('a');
    open.href = x.href;
    open.textContent = 'Abrir';
    actions.appendChild(open);
    row.appendChild(a);
    row.appendChild(actions);
    list.appendChild(row);
  });
}
render();
q.addEventListener('input', (e)=>render(e.target.value));
</script>
</body>
</html>
