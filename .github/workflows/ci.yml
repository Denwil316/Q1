name: CodeX CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: |
          package-lock.json
          apps/preh-nav-m1/package-lock.json
    
    - name: Install root dependencies
      run: npm ci
    
    - name: Install frontend dependencies
      working-directory: apps/preh-nav-m1
      run: npm ci
    
    - name: Build frontend
      working-directory: apps/preh-nav-m1
      run: npm run build
    
    - name: Check bash scripts syntax
      run: |
        for f in scripts/*.sh; do
          bash -n "$f" || { echo "Syntax error in $f"; exit 1; }
        done
    
  lint:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Check for TypeScript errors
      working-directory: apps/preh-nav-m1
      run: npx tsc --noEmit || true

    - name: Run ESLint
      working-directory: apps/preh-nav-m1
      run: npm run lint || true